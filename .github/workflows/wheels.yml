name: Wheel build

on:
  release:
    types: [created]
  schedule:
  #        ┌───────────── minute (0 - 59)
  #        │  ┌───────────── hour (0 - 23)
  #        │  │ ┌───────────── day of the month (1 - 31)
  #        │  │ │ ┌───────────── month (1 - 12 or JAN-DEC)
  #        │  │ │ │ ┌───────────── day of the week (0 - 6 or SUN-SAT)
  #        │  │ │ │ │
  - cron: "42 3 * * 4"
  push:
    paths:
      - .github/workflows/wheels.yml
      - requirements.txt
      - pyproject.toml
      - MANIFEST.in
      - Makefile
      - setup*
      - build*
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/wheels.yml
      - requirements.txt
      - pyproject.toml
      - MANIFEST.in
      - Makefile
      - setup*
      - build*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  sdist:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Check out recursively
      run: git submodule update --init --recursive

    - name: Set up Python
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
      with:
        python-version: "3.x"

    - name: Install Python dependencies
      run: python -m pip install -r requirements.txt

    - name: Build sdist
      run: make sdist

    - name: Upload sdist
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: sdist
        path: dist/*.tar.gz

  generate-wheels-matrix:
    # Create a matrix of all architectures & versions to build.
    # This enables the next step to run cibuildwheel in parallel.
    # From https://iscinumpy.dev/post/cibuildwheel-2-10-0/#only-210
    name: Generate wheels matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set-matrix.outputs.include }}
    steps:
      - uses: actions/checkout@v5

      - name: Install cibuildwheel
        # Nb. keep cibuildwheel version pin consistent with job below
        run: pipx install cibuildwheel==3.3.1

      - id: set-matrix
        run: |
          MATRIX=$(
            {
              cibuildwheel --print-build-identifiers --platform linux --archs "x86_64,aarch64" \
              | grep -v musllinux \
              | jq -nRc '{"only": inputs, "os": "ubuntu-latest"}' \
              | sed -e '/aarch64/s|ubuntu-latest|ubuntu-24.04-arm|' \
              && cibuildwheel --print-build-identifiers --platform macos --archs arm64 \
              | jq -nRc '{"only": inputs, "os": "macos-latest"}' \
              && cibuildwheel --print-build-identifiers --platform windows --archs AMD64 \
              | jq -nRc '{"only": inputs, "os": "windows-latest"}'
            } | jq -sc
          )
          echo "include=$MATRIX"
          echo "include=$MATRIX" >> $GITHUB_OUTPUT

  build_wheels:
    name: Build for ${{ matrix.only }}
    needs: generate-wheels-matrix
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-wheels-matrix.outputs.include) }}

    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
      LUPA_WITH_LUA_DLOPEN: ${{ startsWith(matrix.os, 'windows') && 'false' || 'true' }}

    steps:
      - uses: actions/checkout@v5

      - name: Check out recursively
        run: git submodule update --init --recursive

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Install MacOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install automake libtool
          ln -s /usr/local/bin/glibtoolize /usr/local/bin/libtoolize

      - name: Setup Visual Studio for x64
        if: contains(matrix.os, 'windows') && contains(matrix.only, 'win_amd64')
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Setup Visual Studio for x86
        if: contains(matrix.os, 'windows') && contains(matrix.only, 'win32')
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x86

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        with:
          only: ${{ matrix.only }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          path: ./wheelhouse/*.whl
          name: wheel-${{ matrix.only }}

  build_limited_api_wheels:
    name: Build Stable ABI wheels on ${{ matrix.os }}
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      (github.event_name == 'schedule' && github.repository == 'cython/cython') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-latest'
          - 'ubuntu-24.04-arm'
          - 'windows-latest'
          - 'windows-11-arm'
          - 'macos-latest'

    steps:
      - name: Checkout Cython
        uses: actions/checkout@v6

      - name: Check out recursively
        run: git submodule update --init --recursive

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Install MacOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install automake libtool
          ln -s /usr/local/bin/glibtoolize /usr/local/bin/libtoolize

      - name: Setup Visual Studio for x64
        if: contains(matrix.os, 'windows') && contains(matrix.only, 'win_amd64')
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Setup Visual Studio for x86
        if: contains(matrix.os, 'windows') && contains(matrix.only, 'win32')
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x86

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          # Smaller set of platforms that we only provide Stable ABI wheels for
          CIBW_BUILD: |
            ${{
                matrix.os == 'ubuntu-24.04-arm' && '*armv7l *musllinux_aarch64' ||
                matrix.os == 'ubuntu-latest' && '*linux_i686 *musllinux_x86_64' ||
                matrix.os == 'windows-latest' && '*win32' ||
                matrix.os == 'macos-latest' && '*macosx_x86_64' ||
                matrix.os == 'windows-11-arm' && '*win_arm64' ||
            '' }}
          CIBW_SKIP: "cp31*t-* cp38-* pp*"

      - name: Check wheel
        run: |
          python -m pip install twine
          python -m twine check ./wheelhouse/*.whl

      - uses: actions/upload-artifact@v6.0.0
        with:
          name: Stable-ABI-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  upload_release_assets:
    name: Upload Release Wheels
    needs: [ sdist, build_wheels, build_limited_api_wheels, manylinux2014 ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags')

    permissions:
      contents: write  # to create GitHub release (softprops/action-gh-release)

    steps:
      - name: Download bdist files
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: ./bdist_downloads
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la ./bdist_downloads

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          path: ./bdist_downloads/*.whl
          name: wheels

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./bdist_downloads/*.whl
            ./bdist_downloads/*.tar.gz

  manylinux2014:
    strategy:
      # Allows for matrix sub-jobs to fail without canceling the rest
      fail-fast: false

      matrix:
        image:
          - manylinux2014_x86_64
          - manylinux2014_i686
        pyversion: ["*"]

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Check out recursively
      run: git submodule update --init --recursive

    - name: Set up Python
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: python -m pip install -r requirements.txt

    - name: Build Linux wheels
      run: make USE_BUNDLE=true sdist wheel_${{ matrix.image }}
      env: { PYTHON_BUILD_VERSION: "${{ matrix.pyversion }}" }

    - name: Upload wheels
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: wheels-${{ matrix.image }}
        path: wheelhouse_*/*-m*linux*.whl  # manylinux / musllinux
        if-no-files-found: ignore
